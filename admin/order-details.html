<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>HABÄNE — Redirecting...</title>
  <script>
    (function() {
      const params = new URLSearchParams(window.location.search);
      const id = params.get('id');
      if (id) {
        window.location.replace('admin.html#order/' + id);
      } else {
        window.location.replace('admin.html#orders');
      }
    })();
  </script>
</head>
<body>
  <p style="font-family: sans-serif; text-align: center; margin-top: 10%; color: #5e668e;">
    Redirecting to secure Order Management portal...
  </p>
</body>
</html>
